<body>
  <div class="background-texture"></div>
  <main class="container">
    <header>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <span class="icon">🌓</span>
      </button>
      <h1>LOTTO 6/45</h1>
      <p>행운의 번호를 확인해보세요</p>

    <div id="lotto-display" class="ball-container">
      <div class="placeholder-text">버튼을 눌러 번호를 생성하세요</div>
    </div>

    <button id="generate-btn" class="generate-btn">
      <span class="btn-icon">✨</span>
      번호 생성하기
    </button>

    <div id="email-section" class="email-section hidden">
      <hr class="divider">
      <p class="section-title">번호를 이메일로 보내시겠습니까?</p>
      <form id="lotto-form" action="https://formspree.io/f/mqedjpkn" method="POST" class="lotto-form">
        <input type="email" name="email" placeholder="이메일 주소 입력" required class="input-field">
        <input type="hidden" name="lotto_numbers" id="hidden-lotto-numbers">
        <button type="submit" id="submit-btn" class="submit-btn">보내기</button>
      </form>
      <div id="form-status" class="form-status"></div>
    </div>

    <section class="comments-section">
      <hr class="divider">
      <p class="section-title">댓글</p>
